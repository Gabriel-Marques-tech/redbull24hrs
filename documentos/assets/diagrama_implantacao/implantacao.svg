<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 560" width="820" height="560" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#777"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="820" height="560" fill="white"/>

  <!-- ===================== -->
  <!-- NODE: Dispositivo Cliente (top-left) -->
  <!-- ===================== -->
  <!-- 3D effect tab -->
  <polygon points="20,20 80,20 90,10 820,10" fill="none" stroke="none"/>
  <rect x="20" y="20" width="200" height="160" rx="2" ry="2" fill="#F5F5F5" stroke="#333" stroke-width="1.5"/>
  <!-- 3D top tab -->
  <rect x="20" y="20" width="70" height="14" rx="1" ry="1" fill="#E8E8E8" stroke="#333" stroke-width="1.5"/>
  <!-- Node label -->
  <text x="120" y="37" text-anchor="middle" font-size="10" fill="#555" font-style="italic">&lt;&lt;device&gt;&gt;</text>
  <text x="120" y="52" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Dispositivo Cliente</text>
  <!-- Separator line -->
  <line x1="20" y1="58" x2="220" y2="58" stroke="#AAA" stroke-width="1"/>
  <!-- Artifact: Navegador Web -->
  <rect x="45" y="72" width="130" height="50" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <!-- artifact icon (top-right folded corner) -->
  <polygon points="160,72 175,72 175,87 160,87" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="160,72 175,87 160,87" fill="white" stroke="#555" stroke-width="1"/>
  <text x="110" y="91" text-anchor="middle" font-size="10" fill="#333">Navegador Web</text>
  <text x="110" y="105" text-anchor="middle" font-size="9" fill="#666">(Chrome / Firefox / Safari)</text>

  <!-- ===================== -->
  <!-- NODE: GitLab Pages (top-right) -->
  <!-- ===================== -->
  <rect x="600" y="20" width="200" height="160" rx="2" ry="2" fill="#F5F5F5" stroke="#333" stroke-width="1.5"/>
  <rect x="600" y="20" width="70" height="14" rx="1" ry="1" fill="#E8E8E8" stroke="#333" stroke-width="1.5"/>
  <text x="700" y="37" text-anchor="middle" font-size="10" fill="#555" font-style="italic">&lt;&lt;cloud&gt;&gt;</text>
  <text x="700" y="52" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">GitLab Pages</text>
  <line x1="600" y1="58" x2="800" y2="58" stroke="#AAA" stroke-width="1"/>
  <!-- Artifact: Swagger UI -->
  <rect x="625" y="72" width="150" height="50" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <polygon points="760,72 775,72 775,87 760,87" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="760,72 775,87 760,87" fill="white" stroke="#555" stroke-width="1"/>
  <text x="700" y="91" text-anchor="middle" font-size="10" fill="#333">Documentacao OpenAPI</text>
  <text x="700" y="105" text-anchor="middle" font-size="9" fill="#666">(Swagger UI)</text>

  <!-- ===================== -->
  <!-- NODE: Servidor de Aplicacao (center) -->
  <!-- ===================== -->
  <rect x="220" y="200" width="380" height="220" rx="2" ry="2" fill="#F5F5F5" stroke="#333" stroke-width="1.5"/>
  <rect x="220" y="200" width="90" height="14" rx="1" ry="1" fill="#E8E8E8" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="217" text-anchor="middle" font-size="10" fill="#555" font-style="italic">&lt;&lt;executionEnvironment&gt;&gt;</text>
  <text x="410" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Servidor de Aplicacao</text>
  <line x1="220" y1="240" x2="600" y2="240" stroke="#AAA" stroke-width="1"/>
  <!-- Artifact: Node.js -->
  <rect x="245" y="256" width="130" height="44" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <polygon points="360,256 375,256 375,271 360,271" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="360,256 375,271 360,271" fill="white" stroke="#555" stroke-width="1"/>
  <text x="310" y="275" text-anchor="middle" font-size="10" fill="#333">Node.js 20 + Express 5</text>
  <text x="310" y="291" text-anchor="middle" font-size="9" fill="#666">HTTP server / router</text>
  <!-- Artifact: TypeScript -->
  <rect x="245" y="316" width="130" height="44" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <polygon points="360,316 375,316 375,331 360,331" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="360,316 375,331 360,331" fill="white" stroke="#555" stroke-width="1"/>
  <text x="310" y="335" text-anchor="middle" font-size="10" fill="#333">TypeScript (compilado)</text>
  <text x="310" y="351" text-anchor="middle" font-size="9" fill="#666">tsc → dist/</text>
  <!-- Artifact: EJS -->
  <rect x="405" y="256" width="175" height="44" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <polygon points="565,256 580,256 580,271 565,271" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="565,256 580,271 565,271" fill="white" stroke="#555" stroke-width="1"/>
  <text x="492" y="275" text-anchor="middle" font-size="10" fill="#333">EJS (SSR)</text>
  <text x="492" y="291" text-anchor="middle" font-size="9" fill="#666">server-side rendering</text>
  <!-- Artifact: pg pool -->
  <rect x="405" y="316" width="175" height="44" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <polygon points="565,316 580,316 580,331 565,331" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="565,316 580,331 565,331" fill="white" stroke="#555" stroke-width="1"/>
  <text x="492" y="335" text-anchor="middle" font-size="10" fill="#333">pg Pool</text>
  <text x="492" y="351" text-anchor="middle" font-size="9" fill="#666">conexao PostgreSQL</text>

  <!-- ===================== -->
  <!-- NODE: Banco de Dados (bottom-center) -->
  <!-- ===================== -->
  <rect x="290" y="460" width="240" height="80" rx="2" ry="2" fill="#F5F5F5" stroke="#333" stroke-width="1.5"/>
  <rect x="290" y="460" width="70" height="14" rx="1" ry="1" fill="#E8E8E8" stroke="#333" stroke-width="1.5"/>
  <text x="410" y="477" text-anchor="middle" font-size="10" fill="#555" font-style="italic">&lt;&lt;database&gt;&gt;</text>
  <text x="410" y="490" text-anchor="middle" font-size="12" font-weight="bold" fill="#222">Banco de Dados</text>
  <line x1="290" y1="496" x2="530" y2="496" stroke="#AAA" stroke-width="1"/>
  <!-- Artifact: PostgreSQL -->
  <rect x="315" y="507" width="190" height="22" rx="3" ry="3" fill="white" stroke="#555" stroke-width="1"/>
  <polygon points="490,507 505,507 505,522 490,522" fill="#DDD" stroke="#555" stroke-width="1"/>
  <polygon points="490,507 505,522 490,522" fill="white" stroke="#555" stroke-width="1"/>
  <text x="410" y="522" text-anchor="middle" font-size="10" fill="#333">PostgreSQL 16</text>

  <!-- ===================== -->
  <!-- ARROWS -->
  <!-- ===================== -->

  <!-- Navegador Web → Servidor de Aplicacao: HTTPS / REST -->
  <!-- From right edge of client node (220,100) to top-left of server node (220,280) -->
  <line x1="220" y1="100" x2="270" y2="100" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="100" x2="270" y2="200" stroke="#444" stroke-width="1.5"/>
  <text x="285" y="153" font-size="10" fill="#333">HTTPS / REST</text>

  <!-- Servidor de Aplicacao → Banco de Dados: TCP 5432 -->
  <line x1="410" y1="420" x2="410" y2="460" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="415" y="447" font-size="10" fill="#333">TCP 5432</text>
  <text x="415" y="459" font-size="9" fill="#666">(pg pool)</text>

  <!-- Navegador Web → GitLab Pages: HTTPS -->
  <line x1="220" y1="80" x2="600" y2="80" stroke="#444" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="74" text-anchor="middle" font-size="10" fill="#333">HTTPS</text>

  <!-- Servidor de Aplicacao → GitLab Pages: referencia (dashed) -->
  <line x1="600" y1="310" x2="650" y2="310" stroke="#777" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-dashed)"/>
  <line x1="650" y1="310" x2="700" y2="180" stroke="#777" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="660" y="260" font-size="9" fill="#777" font-style="italic">referencia</text>

  <!-- Title -->
  <text x="410" y="548" text-anchor="middle" font-size="11" fill="#888">Diagrama de Implantacao UML — RedRunners G02 (Sprint 4)</text>
</svg>
