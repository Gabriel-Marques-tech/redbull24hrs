<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link href="https://fonts.googleapis.com/css?family=Inter:400,500,700&display=swap" rel="stylesheet">
    <link href="../css/login.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
</head>

<body>

    <div class="login">
        <img src="../assets/logo-RB24h/logo.png" alt="logo">
        <div class="titulo">
            <h1>Faça seu login</h1><br>
            <p>24 horas conectando ideias, energias e<br> pessoas que fazem acontecer.</p>
        </div>
        <div class="form">
            <form action="home-auditor.html" method="post">
                <label for="Usuário">Usuário</label>
                <input type="text" id="Usuário" name="Usuário" placeholder="Insira seu Usuário" required>
                <label for="Senha" class="l1">Senha</label>
                <input type="password" name="Senha" id="Senha" placeholder="Insira sua senha" required><br>
                <button><strong>Entrar</strong></button>
            </form>
        </div>
    </div>

</body>

</html>
