<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de km menor que o anterior - Auditor</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/km-menor-aviso.css">
</head>
<body>
    <div class="barra-gradiente"></div>

    <main class="pagina-km-menor-aviso">
        <button class="btn-sair-km-menor" type="button" aria-label="Sair">&#8618;</button>

        <section class="modal-km-menor-teste">
            <div class="icone-km-menor-teste" aria-hidden="true"></div>
            <h1>Km menor que o anterior</h1>
            <p>O Km informado e menor que o<br>ultimo valor registrado</p>

            <div class="resumo-km-menor-teste">
                <div class="linha-km-menor-teste">
                    <span>Km anterior</span>
                    <strong>10km</strong>
                </div>
                <div class="divisor-km-menor-teste"></div>
                <div class="linha-km-menor-teste">
                    <span>Km informado</span>
                    <strong class="valor-km-informado-teste">2 km</strong>
                </div>
            </div>

            <div class="acoes-km-menor-teste">
                <button class="btn-cancelar-km-menor-teste" id="btnCancelarKmMenorTeste" type="button">Cancelar</button>
                <button class="btn-corrigir-km-menor-teste" id="btnCorrigirKmMenorTeste" type="button">Corrigir</button>
            </div>
        </section>
    </main>

    <script src="../js/km-menor-aviso.js"></script>
</body>
</html>
