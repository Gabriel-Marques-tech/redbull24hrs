<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de checkpoint nao registrado - Auditor</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/checkpoint-aviso.css">
</head>
<body>
    <div class="barra-gradiente"></div>

    <main class="pagina-checkpoint-aviso">
        <button class="btn-sair-checkpoint" type="button" aria-label="Sair">&#8618;</button>

        <section class="modal-checkpoint-aviso-teste">
            <button class="btn-fechar-checkpoint-teste" id="btnFecharCheckpointTeste" type="button" aria-label="Fechar aviso">&times;</button>
            <img class="icone-checkpoint-aviso-teste" src="../assets/chekpoint/perigo.svg" alt="">
            <h1>Registrar Checkpoint?</h1>
            <p>Nao identificamos checkpoints<br>registrados a mais de 5 minutos</p>
            <button class="btn-registrar-checkpoint" id="btnRegistrarCheckpoint" type="button">Registrar checkpoint</button>
        </section>
    </main>

    <script src="../js/checkpoint-aviso.js"></script>
</body>
</html>
