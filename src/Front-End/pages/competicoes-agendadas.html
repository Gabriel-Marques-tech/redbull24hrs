<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competições agendadas</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/competicoes-agendadas.css">
</head>
<body>
    <div class="barra-gradiente"></div>

    <a href="home-auditor.html" class="cancelar">
        <img src="../assets/competição/Seta.svg" alt="">
        Cancelar
    </a>

    <main class="agenda-competicoes">
        <header class="cabecalho-agenda">
            <p>
                <img class="icone-localizacao" src="../assets/competicoes-agendadas/Point.svg" alt="">
                <span id="cidadeSelecionada">Rio de Janeiro</span>
            </p>
            <h1>Competições agendadas</h1>
        </header>

        <section class="lista-agenda" aria-label="Competições agendadas">
            <div class="linha-competicao">
                <span>1</span>
                <p class="local-competicao"></p>
                <p>22/02/2025</p>
                <p>15:00:00</p>
                <p>Agendada</p>
            </div>

            <div class="linha-competicao">
                <span>2</span>
                <p class="local-competicao"></p>
                <p>21/02/2025</p>
                <p>15:00:00</p>
                <p>Em andamento</p>
            </div>

            <div class="linha-competicao">
                <span>3</span>
                <p class="local-competicao"></p>
                <p>19/02/2025</p>
                <p>15:00:00</p>
                <p>Concluída</p>
            </div>

            <div class="linha-competicao">
                <span>4</span>
                <p class="local-competicao"></p>
                <p>18/02/2025</p>
                <p>15:00:00</p>
                <p>Concluída</p>
            </div>

            <div class="linha-competicao">
                <span>5</span>
                <p class="local-competicao"></p>
                <p>17/02/2025</p>
                <p>15:00:00</p>
                <p>Concluída</p>
            </div>
        </section>
    </main>

    <script src="../js/competicoes-agendadas.js"></script>
</body>
</html>
